<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" role="img" aria-label="PrepMed logo">
  <defs>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1cb5b0"/>
      <stop offset="100%" stop-color="#0d4f4d"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c4d"/>
      <stop offset="100%" stop-color="#e85d1a"/>
    </linearGradient>
  </defs>

  <!-- Icon: graduation-cap "P" -->
  <g transform="translate(10,10)">
    <!-- P stem -->
    <rect x="14" y="18" width="30" height="150" rx="15" fill="url(#tealGrad)"/>
    <!-- P bowl -->
    <path d="M44 18
             H100
             A54 54 0 0 1 100 126
             H44
             Z"
          fill="url(#tealGrad)"/>
    <!-- bowl counter (cut-out) -->
    <path d="M44 46
             H98
             A26 26 0 0 1 98 98
             H44
             Z"
          fill="#eefbfa"/>

    <!-- Mortarboard sitting on the bowl -->
    <g transform="translate(46,32)">
      <polygon points="46,0 92,20 46,40 0,20" fill="#ffffff" stroke="url(#tealGrad)" stroke-width="4" stroke-linejoin="round"/>
      <rect x="66" y="20" width="7" height="30" rx="3" fill="url(#orangeGrad)"/>
      <circle cx="69.5" cy="53" r="7" fill="url(#orangeGrad)"/>
    </g>

    <!-- Cursor / pointer accent -->
    <g transform="translate(4,-6) rotate(-12)">
      <path d="M0 0 L34 12 L19 17 L11 34 Z" fill="url(#orangeGrad)" stroke="#eefbfa" stroke-width="3" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(198,0)">
    <text x="0" y="108" font-family="'Sora','Segoe UI',Arial,sans-serif" font-weight="800" font-size="76" letter-spacing="1" fill="url(#tealGrad)">PREP<tspan font-weight="500" fill="#3fc0bb">MED</tspan></text>
    <text x="424" y="70" font-family="'Sora','Segoe UI',Arial,sans-serif" font-weight="700" font-size="20" fill="#0d4f4d">&#174;</text>
    <text x="4" y="148" font-family="'Sora','Segoe UI',Arial,sans-serif" font-weight="500" font-size="30" letter-spacing="1.5" fill="#3fc0bb">Education Beyond Barrier</text>
  </g>
</svg>
