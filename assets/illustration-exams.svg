<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" role="img" aria-label="PrepMed CBT exam screen illustration">
  <defs>
    <linearGradient id="eTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3fc0bb"/>
      <stop offset="100%" stop-color="#0f6664"/>
    </linearGradient>
    <linearGradient id="eOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c4d"/>
      <stop offset="100%" stop-color="#e85d1a"/>
    </linearGradient>
  </defs>

  <circle cx="110" cy="100" r="140" fill="#d7f3f1" opacity="0.55"/>
  <circle cx="430" cy="330" r="120" fill="#ff8c4d" opacity="0.13"/>

  <!-- monitor stand -->
  <g transform="translate(160,300)">
    <rect x="70" y="0" width="20" height="34" rx="4" fill="#0d4f4d"/>
    <rect x="30" y="32" width="140" height="16" rx="8" fill="#0d4f4d"/>
  </g>

  <!-- monitor frame -->
  <g transform="translate(60,40)">
    <rect x="0" y="0" width="320" height="252" rx="22" fill="#062b2b"/>
    <rect x="12" y="12" width="296" height="228" rx="14" fill="#ffffff"/>

    <!-- top bar: timer -->
    <rect x="28" y="28" width="120" height="12" rx="6" fill="#0d4f4d"/>
    <g transform="translate(224,22)">
      <rect x="0" y="0" width="64" height="26" rx="13" fill="#fff1e8"/>
      <circle cx="16" cy="13" r="7" fill="none" stroke="#e85d1a" stroke-width="2.5"/>
      <path d="M16 8 v5 l4 3" fill="none" stroke="#e85d1a" stroke-width="2" stroke-linecap="round"/>
      <text x="34" y="18" font-family="'Sora','Segoe UI',Arial,sans-serif" font-weight="700" font-size="12" fill="#e85d1a">18:24</text>
    </g>

    <!-- question -->
    <rect x="28" y="60" width="264" height="9" rx="4.5" fill="#0a2323" opacity="0.8"/>
    <rect x="28" y="76" width="200" height="8" rx="4" fill="#dcefec"/>

    <!-- options -->
    <g transform="translate(28,100)">
      <circle cx="10" cy="10" r="9" fill="url(#eOrange)"/>
      <circle cx="10" cy="10" r="3.5" fill="#ffffff"/>
      <rect x="30" y="4" width="150" height="12" rx="6" fill="#fff1e8"/>
    </g>
    <g transform="translate(28,128)">
      <circle cx="10" cy="10" r="9" fill="none" stroke="#dcefec" stroke-width="2.5"/>
      <rect x="30" y="4" width="180" height="12" rx="6" fill="#eefbfa"/>
    </g>
    <g transform="translate(28,156)">
      <circle cx="10" cy="10" r="9" fill="none" stroke="#dcefec" stroke-width="2.5"/>
      <rect x="30" y="4" width="130" height="12" rx="6" fill="#eefbfa"/>
    </g>
    <g transform="translate(28,184)">
      <circle cx="10" cy="10" r="9" fill="none" stroke="#dcefec" stroke-width="2.5"/>
      <rect x="30" y="4" width="160" height="12" rx="6" fill="#eefbfa"/>
    </g>

    <!-- progress bar -->
    <rect x="28" y="212" width="264" height="8" rx="4" fill="#eefbfa"/>
    <rect x="28" y="212" width="150" height="8" rx="4" fill="url(#eTeal)"/>
  </g>

  <!-- floating registered badge -->
  <g transform="translate(20,290)">
    <rect x="0" y="0" width="120" height="52" rx="16" fill="#ffffff" stroke="#dcefec" stroke-width="2"/>
    <circle cx="26" cy="26" r="14" fill="url(#eTeal)"/>
    <path d="M19 26 l5 5 l10 -10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="23" font-family="'Sora','Segoe UI',Arial,sans-serif" font-weight="700" font-size="11" fill="#0d4f4d">Registered</text>
    <text x="48" y="37" font-family="'Sora','Segoe UI',Arial,sans-serif" font-weight="500" font-size="10" fill="#4d6a69">CBT 07 · Jul 14</text>
  </g>

  <!-- floating pencil badge -->
  <g transform="translate(392,120)">
    <rect x="0" y="0" width="72" height="72" rx="20" fill="url(#eOrange)"/>
    <path d="M22 50 l3 -14 l17 -17 l11 11 l-17 17 z" fill="#ffffff"/>
    <path d="M25 36 l11 11" stroke="#e85d1a" stroke-width="2"/>
  </g>
</svg>
